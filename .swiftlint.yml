# SwiftLint configuration for Mytty
# Modeled on Ice (macOS menu bar app) with adjustments for C interop.

excluded:
  - .build
  - vendor
  - MyttyCLI

# C interop: libghostty callbacks use single-letter params (e.g., F for flags,
# T for target). Short names are idiomatic in C bridge code.
identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 60
  excluded:
    - F
    - T

# --- Disabled rules ---
#
# Each rule here was evaluated and disabled for a specific reason.
# Before re-enabling, check the stated reason still applies.
#
# Rules that need per-function audit to set thresholds:
#   cyclomatic_complexity  - dispatch switches (IPC, vi motions, action callbacks)
#                            inflate complexity scores. Re-enable with
#                            ignores_case_statements: true after auditing.
#   function_body_length   - same dispatch functions span 100-150 lines.
#                            Default 50/100 would flag ~14 functions.
#   type_body_length       - IPCService (455 lines), CopyModeState (503 lines)
#                            are structurally large. Default 250/350 flags 8 types.
#   function_parameter_count - C bridge functions pass through libghostty params.
#
# Rules disabled for style consistency:
#   line_length            - long switch cases and C interop lines. Enforcing
#                            120 chars would require wrapping that hurts readability
#                            in bridge code.
#   nesting                - pattern matching on libghostty enums nests deeply.
#   trailing_comma         - project follows no-trailing-comma to match Ghostty style.
#   todo                   - TODOs are a deliberate workflow (see comment-tags skill).
#                            Enabling this would flag every intentional deferral.
#   multiple_closures_with_trailing_closure - fires on SwiftUI view builders and
#                            .onReceive chains, which are idiomatic in this project.
#   closure_parameter_position - fires on multi-line notification handlers.
#
disabled_rules:
  - cyclomatic_complexity
  - function_body_length
  - function_parameter_count
  - line_length
  - nesting
  - todo
  - trailing_comma
  - type_body_length
  - multiple_closures_with_trailing_closure
  - closure_parameter_position

# Largest file is ContentView.swift (~1050 lines after consolidating handlers).
# Threshold catches unbounded growth without flagging current files.
# See TODO in ContentView.swift for the @Observable extraction that would
# shrink it and allow re-splitting handlers into a separate file.
file_length:
  warning: 1200
  error: 2000
  ignore_comment_only_lines: true

# C interop: libghostty returns multi-element tuples for color values,
# geometry, and action parameters.
large_tuple:
  warning: 4
  error: 5

# --- Opt-in rules ---

opt_in_rules:
  # Bug prevention (do not disable without a comment explaining why)
  - force_unwrapping
  - discarded_notification_center_observer
  - private_swiftui_state
  - identical_operands
  # Style and consistency
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_type_annotation
  - shorthand_optional_binding
  - sorted_imports
  - superfluous_else
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - xct_specific_matcher
  - yoda_condition
