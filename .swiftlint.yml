# SwiftLint configuration for Mistty
# Modeled on Ice (macOS menu bar app, 14.7k stars) with adjustments for C interop

excluded:
  - .build
  - vendor
  - MisttyCLI

# Relax for C interop and idiomatic Swift
identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 60
  excluded:
    - F
    - T

# Disable length/complexity rules (terminal emulators have inherently complex
# rendering and event handling code, these are noise)
disabled_rules:
  - cyclomatic_complexity
  - file_length
  - function_body_length
  - function_parameter_count
  - line_length
  - nesting
  - todo
  - trailing_comma
  - type_body_length
  - opening_brace
  - multiple_closures_with_trailing_closure
  - unused_closure_parameter
  - closure_parameter_position

large_tuple:
  warning: 4
  error: 5

# Opt-in rules (aligned with Ice and community best practices)
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_type_annotation
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition
