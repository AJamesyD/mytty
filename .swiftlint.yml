# SwiftLint configuration for Mytty
# Modeled on Ice (macOS menu bar app, 14.7k stars) with adjustments for C interop

excluded:
  - .build
  - vendor
  - MyttyCLI

# Relax for C interop and idiomatic Swift
identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 60
  excluded:
    - F
    - T

# Disable length/complexity rules that need per-function analysis to tune.
# TODO: re-enable with tuned thresholds after auditing which large functions
# are structurally necessary (dispatch switches, C bridges) vs. splittable.
# Candidates: function_body_length (150/250), type_body_length (500/750),
# cyclomatic_complexity with ignores_case_statements: true.
disabled_rules:
  - cyclomatic_complexity
  - function_body_length
  - function_parameter_count
  - line_length
  - nesting
  - todo
  - trailing_comma
  - type_body_length
  - multiple_closures_with_trailing_closure
  - closure_parameter_position

# Re-enabled with thresholds tuned to current codebase.
# Largest file is ContentView.swift (~1050 lines).
file_length:
  warning: 1200
  error: 2000
  ignore_comment_only_lines: true

large_tuple:
  warning: 4
  error: 5

# Opt-in rules (aligned with Ice and community best practices)
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_type_annotation
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition
  - force_unwrapping
  - discarded_notification_center_observer
  - private_swiftui_state
  - identical_operands
  - sorted_imports
  - shorthand_optional_binding
  - superfluous_else
  - xct_specific_matcher
