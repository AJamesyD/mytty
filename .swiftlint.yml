# SwiftLint configuration for Mytty
# Modeled on Ice (macOS menu bar app) with adjustments for C interop.

excluded:
  - .build
  - vendor
  - MyttyCLI

# C interop: libghostty callbacks use single-letter params (e.g., F for flags,
# T for target). Short names are idiomatic in C bridge code.
identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 60
  excluded:
    - F
    - T

# Function length is a proxy for "too many responsibilities," not a goal
# in itself. A 150-line function doing one complex thing (event dispatch,
# parsing) is fine. A 40-line function doing four unrelated things is not.
# Warn at 100 to flag growth; error at 200 to catch genuine god functions.
function_body_length:
  warning: 100
  error: 200

type_body_length:
  warning: 350
  error: 550

cyclomatic_complexity:
  ignores_case_statements: true
  warning: 15
  error: 25

# --- Disabled rules ---
#
# Each rule here was evaluated and disabled for a specific reason.
# Before re-enabling, check the stated reason still applies.
#
# Rules disabled because swift-format is authoritative for code layout.
# swift-format owns: whitespace, indentation, line breaks, brace placement.
# SwiftLint owns: naming, complexity, architecture, code smells.
# When the two tools disagree on layout, swift-format wins.
#   opening_brace          - swift-format places the brace on a new line after
#                            multi-line conditions. SwiftLint doesn't account for this.
#   trailing_whitespace    - swift-format handles all trailing whitespace.
#   trailing_newline       - swift-format handles EOF newlines.
#   line_length            - swift-format wraps lines; enforcing a hard limit on top
#                            creates unresolvable conflicts in C interop code.
#   trailing_comma         - project follows no-trailing-comma to match Ghostty style.
#   closure_parameter_position - swift-format controls closure parameter layout.
#
# Rules disabled for project-specific reasons:
#   function_parameter_count - C bridge functions pass through libghostty params.
#   nesting                - pattern matching on libghostty enums nests deeply.
#   todo                   - TODOs are a deliberate workflow (see comment-tags skill).
#   multiple_closures_with_trailing_closure - fires on SwiftUI view builders and
#                            .onReceive chains, which are idiomatic in this project.
#
disabled_rules:
  - opening_brace
  - trailing_whitespace
  - trailing_newline
  - line_length
  - trailing_comma
  - closure_parameter_position
  - function_parameter_count
  - nesting
  - todo
  - multiple_closures_with_trailing_closure

# Largest file is ContentView.swift (~1050 lines after consolidating handlers).
# Threshold catches unbounded growth without flagging current files.
# See TODO in ContentView.swift for the @Observable extraction that would
# shrink it and allow re-splitting handlers into a separate file.
file_length:
  warning: 1200
  error: 2000
  ignore_comment_only_lines: true

# C interop: libghostty returns multi-element tuples for color values,
# geometry, and action parameters.
large_tuple:
  warning: 4
  error: 5

# --- Opt-in rules ---

opt_in_rules:
  # Bug prevention (do not disable without a comment explaining why)
  - force_unwrapping
  - discarded_notification_center_observer
  - private_swiftui_state
  - identical_operands
  # Style and consistency
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_type_annotation
  - shorthand_optional_binding
  - sorted_imports
  - superfluous_else
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - xct_specific_matcher
  - yoda_condition

# --- Custom rules (architectural constraints) ---

custom_rules:
  ghostty_symbols:
    included: ".*\\.swift"
    excluded: "GhosttyApp\\.swift|ContentView\\.swift|TerminalSurfaceView\\.swift|PaneView\\.swift|CopyModeManager\\.swift|KeySequenceManager\\.swift|NSEvent\\+GhosttyKey\\.swift|PaneNavigationManager\\.swift|IPCService\\.swift|KeyEventEncodingTests\\.swift"
    regex: '\b(GHOSTTY_|ghostty_)'
    message: "Raw ghostty symbols only allowed in bridge files. Use Swift wrapper types."
    severity: error
  opacity_on_theme_token:
    regex: 'MyttyTheme\.[a-zA-Z]+\.opacity\('
    message: "Do not use .opacity() on theme tokens. Create a new token in MyttyTheme instead."
    severity: error