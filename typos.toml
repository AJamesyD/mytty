[default.extend-words]
# POSIX glob_t struct field
pathc = "pathc"
# Two-letter label values in LabelAssigner test data
ba = "ba"

[default.extend-identifiers]
# Test data: intentional misspellings/partial strings
proejct = "proejct"
fo = "fo"

[files]
# vendor/: git submodule, not our code
# docs/ and *.md: domain terms, commit hashes, and proper nouns
extend-exclude = ["vendor/", "docs/", "*.md"]
