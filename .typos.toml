[files]
# Scan code, not prose. Markdown has too many domain terms, commit hashes,
# and proper nouns for typos to be useful there.
extend-exclude = ["vendor/", "docs/", "*.md"]

[default.extend-words]
# Intentional misspellings in fuzzy match test data
proejct = "proejct"
fo = "fo"
# Two-letter label values in LabelAssigner test data
ba = "ba"
