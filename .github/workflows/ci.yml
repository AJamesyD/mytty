# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      # Swift 6.1+ (Xcode 26+) required: XCTestCase @MainActor lifecycle inheritance.
      # The default Xcode 16.4 ships Swift 6.0 which lacks this.
      # libghostty still uses the 16.x SDK (auto-discovered via DEVELOPER_DIR).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Ghostty submodule revision
        id: ghostty
        run: echo "rev=$(git -C vendor/ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache libghostty
        id: cache-libghostty
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/.zig-cache
          key: libghostty-${{ runner.os }}-${{ steps.ghostty.outputs.rev }}

      - name: Build libghostty
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: nix develop --command just build-libghostty

      - name: CI
        run: nix develop --command bash -c "just ci"
