name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Swift 6.1+ (Xcode 26+) required: XCTestCase @MainActor lifecycle inheritance.
      # The default Xcode 16.4 ships Swift 6.0 which lacks this.
      # libghostty still uses the 16.x SDK (auto-discovered via DEVELOPER_DIR).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Ghostty submodule revision
        id: ghostty
        run: echo "rev=$(git -C vendor/ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore libghostty cache
        id: cache-libghostty
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/.zig-cache
          key: libghostty-${{ runner.os }}-${{ steps.ghostty.outputs.rev }}

      - name: Build libghostty
        id: build-libghostty
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: nix develop --command just build-libghostty

      - name: Save libghostty cache
        if: steps.build-libghostty.outcome == 'success' && steps.cache-libghostty.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/.zig-cache
          key: ${{ steps.cache-libghostty.outputs.cache-primary-key }}

      - name: CI
        run: nix develop --command bash -c "just ci"
