# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: ci
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      # TODO: actions/checkout and actions/cache pin Node.js 20, which GitHub
      #   will deprecate on 2026-06-02. Update to SHAs that use Node.js 22.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Swift 6.1+ (Xcode 26+) required for the Swift build.
      # libghostty still uses the 16.x SDK (auto-discovered via DEVELOPER_DIR).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Ghostty submodule revision
        id: ghostty
        run: echo "rev=$(git -C vendor/ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Restore libghostty cache
        id: cache-libghostty
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/.zig-cache
          key: libghostty-${{ runner.os }}-${{ steps.ghostty.outputs.rev }}

      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build and bundle
        run: nix develop --command just bundle-release

      - name: Save libghostty cache
        if: always() && steps.cache-libghostty.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/.zig-cache
          key: ${{ steps.cache-libghostty.outputs.cache-primary-key }}

      - name: Create DMG
        env:
          TAG: ${{ github.ref_name }}
        run: nix develop --command just dmg "$TAG"

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
        run: nix develop --command just changelog "$TAG" > RELEASE_NOTES.md

      - name: Verify artifacts
        run: ls build/Mytty-*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          body_path: RELEASE_NOTES.md
          files: build/Mytty-*.dmg
